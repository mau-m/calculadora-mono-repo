apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

configMapGenerator:
  - name: backend-config
    literals:
      - ENVIRONMENT=staging
      - ALLOWED_ORIGINS=https://stg.miapp.com
      - LOG_LEVEL=info

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
