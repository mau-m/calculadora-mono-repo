apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: calculator
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculator
      component: frontend
  template:
    metadata:
      labels:
        app: calculator
        component: frontend
    spec:
      containers:
        - name: frontend
          image: 940075379174.dkr.ecr.us-east-1.amazonaws.com/calculadora/frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              value: backend
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
